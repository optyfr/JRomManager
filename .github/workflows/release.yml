name: Release

on: 
  push:
    tags:
    - '*'

jobs:

  build_linux:
    env:
      beta: ${{contains(github.ref, 'beta')}}
    runs-on: ubuntu-24.04
    steps:
    
    - id: get_version
      uses: battila7/get-version-action@d97fbc34ceb64d1f5d95f4dfd6dce33521ccccf5 # v2
      
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        lfs: true
        submodules: true
        
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      run: ./gradlew build -xtest
      
    - name: Releasing
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/distributions/jrommanager_*_*.deb, build/distributions/jrommanager-*.*.rpm, build/distributions/JRomManager-*.tar.gz"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        bodyFile: "changelogs/${{ steps.get_version.outputs.version }}.md"
        omitNameDuringUpdate: true
        replacesArtifacts: true
        name: "v${{ steps.get_version.outputs.version }}"
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: JPackage DEB with Gradle
      run: ./gradlew jpackage -PtargetPlatform=linux-x64 -PinstallerType=deb
        
    - name: Releasing DEB
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/installer/*"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: JPackage RPM with Gradle
      run: ./gradlew jpackage -PtargetPlatform=linux-x64 -PinstallerType=rpm
        
    - name: Releasing RPM
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/installer/*"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: build AppImage
      run: ./appimage/build.sh
        
    - name: Releasing AppImage
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/JRomManager-*.AppImage"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Docker Prepare
      run: ./prep_docker.sh

    - name: Docker meta
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
      with:
        # list of Docker images to use as base name for tags
        images: |
          optyfr/jrommanager
        # generate Docker tags based on the following events/attributes
        tags: |
          type=schedule
          type=ref,event=branch
          type=ref,event=tag
          type=ref,event=pr
            
    - name: Set up QEMU for Docker
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4
      
    - name: Login to Docker Hub
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push to Docker Hub
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
      with:
        context: ./build/docker/
        push: ${{ github.event_name != 'pull_request' }}
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        
  build_windows:
    env:
      beta: ${{contains(github.ref, 'beta')}}
    needs: build_linux
    runs-on: windows-latest
    steps:
    
    - id: get_version
      uses: battila7/get-version-action@d97fbc34ceb64d1f5d95f4dfd6dce33521ccccf5 # v2
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        submodules: true
        
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: JPackage MSI with Gradle
      run: ./gradlew build jpackage -PtargetPlatform=win-x64 -PinstallerType=msi
        
    - name: Releasing
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/distributions/JRomManager-*.zip"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Releasing MSI
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/installer/*"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
  build_macos_x64:
    env:
      beta: ${{contains(github.ref, 'beta')}}
    needs: build_windows
    runs-on: macos-26
    steps:
    
    - id: get_version
      uses: battila7/get-version-action@d97fbc34ceb64d1f5d95f4dfd6dce33521ccccf5 # v2
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        submodules: true
        
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: JPackage DMG with Gradle
      run: ./gradlew jpackage -PtargetPlatform=macos-x64 -PinstallerType=dmg
        
    - name: Releasing DMG
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/installer/*"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
  build_macos_aarch64:
    env:
      beta: ${{contains(github.ref, 'beta')}}
    needs: build_windows
    runs-on: macos-latest
    steps:
    
    - id: get_version
      uses: battila7/get-version-action@d97fbc34ceb64d1f5d95f4dfd6dce33521ccccf5 # v2
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        submodules: true
        
    - name: Set up JDK 25
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
      with:
        distribution: 'temurin'
        java-version: '25'
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: JPackage DMG with Gradle
      run: ./gradlew jpackage -PtargetPlatform=macos-aarch64 -PinstallerType=dmg
        
    - name: Releasing DMG
      uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
      with:
        artifacts: "build/installer/*"
        draft: false
        prerelease: ${{ env.beta }}
        allowUpdates: true
        omitBodyDuringUpdate: true
        omitNameDuringUpdate: true
        replacesArtifacts: true
        token: ${{ secrets.GITHUB_TOKEN }}
        
        